const SC={Complete:{bg:"#d4edda",text:"#155724",border:"#28a745"},"In Progress":{bg:"#cce5ff",text:"#004085",border:"#007bff"},Pending:{bg:"#fff3cd",text:"#856404",border:"#fd7e14"},Blocked:{bg:"#f8d7da",text:"#721c24",border:"#dc3545"}};
const today=new Date();today.setHours(0,0,0,0);
const addDays=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
const parseD=s=>{if(!s)return null;const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};
const fmtD=s=>{if(!s)return"—";return parseD(s).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});};
const todayStr=()=>new Date().toISOString().slice(0,10);
function bucket(s){
  if(!s)return"none";
  const d=parseD(s);
  if(d<today)return"overdue";
  if(d<=addDays(today,7))return"thisweek";
  if(d<=addDays(today,14))return"nextweek";
  if(d<=addDays(today,30))return"nextmonth";
  return"later";
}
const load=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};

// ── CSV PARSE ─────────────────────────────────────────────────────────────────
function csvRow(r){const res=[];let c="",q=false;for(let i=0;i<r.length;i++){const ch=r[i];if(ch==='"'){if(q&&r[i+1]==='"'){c+='"';i++;}else q=!q;}else if(ch===','&&!q){res.push(c.trim());c="";}else c+=ch;}res.push(c.trim());return res;}
const CM={projectName:["project name","project","task","task name","name","title"],client:["client","client name"],status:["status","state"],dueDate:["due date","due","deadline","date due"],category:["category","section","group","area"],deliverable:["deliverable","deliverables","output"],nextAction:["next action","next step","action","next"],lastUpdated:["last updated","updated","modified"]};
function detectCols(headers){const m={};headers.forEach((h,i)=>{const hn=h.toLowerCase().replace(/[^a-z ]/g,"").trim();for(const[f,aliases]of Object.entries(CM)){if(aliases.some(a=>hn===a||hn.includes(a))&&!m[f])m[f]=i;}});return m;}
function parseCSV(text,cname){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return[];
  const headers=csvRow(lines[0]);
  const cm=detectCols(headers);
  const tasks=[];
  for(let i=1;i<lines.length;i++){
    const cols=csvRow(lines[i]);
    if(cols.every(c=>!c.trim()))continue;
    const g=f=>cm[f]!==undefined?(cols[cm[f]]||"").trim():"";
    const name=g("projectName");if(!name)continue;
    tasks.push({id:Date.now()+i+Math.random(),projectName:name,client:cname,category:g("category")||"General",status:g("status")||"Pending",dueDate:g("dueDate")||"",deliverable:g("deliverable")||"",nextAction:g("nextAction")||"",lastUpdated:g("lastUpdated")||todayStr()});
  }
  return tasks;
}
function parseText(text,cname){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  const first=lines[0]||"";
  if(first.split(",").length>=3||first.split("\t").length>=3)return parseCSV(text.replace(/\t/g,","),cname);
  let cat="General";const tasks=[];
  for(const line of lines){
    const s=line.replace(/^#+\s*/,"").replace(/^\*+|\*+$/g,"").trim();
    if(!s)continue;
    if(line.match(/^#{1,3}\s/)||(s.length<60&&s.endsWith(":")&&!s.match(/[☐✅✓]/)))  {cat=s.replace(/:$/,"").trim();continue;}
    const name=s.replace(/^[☐✅✓✔•\-\*]\s*/,"").trim();
    if(!name||name.length<3)continue;
    const done=line.includes("✅")||line.includes("✓")||line.includes("✔");
    tasks.push({id:Date.now()+tasks.length+Math.random(),projectName:name,client:cname,category:cat,status:done?"Complete":"Pending",dueDate:"",deliverable:"",nextAction:"",lastUpdated:todayStr()});
  }
  return tasks;
}

      e("input",{className:"inp",placeholder:"www.company.com",value:nc.website,onChange:ev=>setNc(p=>({...p,website:ev.target.value}))}),
      ncErr&&e("div",{className:"err"},ncErr),
      e("div",{style:{display:"flex",gap:10,marginTop:4}},
        e("button",{className:"btn",onClick:saveClient},editId?"Save Changes":"Add Client"),
        e("button",{className:"btn-ghost",onClick:()=>{setShowModal(false);setEditId(null);setNcErr("");}  },"Cancel")
      )
    )
  );

  // clients tab
  const ClientsTab=()=>e("div",{style:{padding:24,maxWidth:1600,margin:"0 auto"}},
    // upload
    e("div",{className:"card"},
      e("div",{className:"section-title"},"📂 Upload Task File"),
      e("p",{style:{fontSize:13,color:"#555",marginBottom:14}},"Upload an Excel (saved as CSV) or Word (saved as .txt) file to load tasks. New tasks are merged in — existing tasks are never removed."),
      e("div",{style:{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-end",marginBottom:12}},
        e("div",{style:{flex:1,minWidth:200}},
          e("label",{className:"lbl"},"Select Client"),
          e("select",{className:"sel",style:{marginBottom:0},value:upClient,onChange:ev=>{setUpClient(ev.target.value);setUpStatus(null);}},
            e("option",{value:""},"— Choose a client —"),
            ...activeClients.map(c=>e("option",{key:c.id,value:c.id},`${c.name} (${c.org||c.email})`))
          )
        ),
        e("div",null,
          e("input",{ref:fileRef,type:"file",accept:".csv,.txt,.tsv",id:"fup",style:{display:"none"},onChange:handleUpload}),
          e("label",{htmlFor:"fup",className:"btn",style:{display:"inline-block",opacity:upClient?1:.5,cursor:"pointer"}},"📁 Choose File")
        )
      ),
      upStatus==="error"&&e("div",{style:{color:"#dc3545",fontSize:13,padding:"8px 12px",background:"#fdf0f0",borderRadius:6}},"⚠️ Could not parse the file. Make sure it is saved as .csv or .txt."),
      upStatus==="noclient"&&e("div",{style:{color:"#dc3545",fontSize:13,padding:"8px 12px",background:"#fdf0f0",borderRadius:6}},"⚠️ Please select a client first."),
      upStatus==="empty"&&e("div",{style:{color:"#dc3545",fontSize:13,padding:"8px 12px",background:"#fdf0f0",borderRadius:6}},"⚠️ No tasks found. Make sure your file has a column called 'Task' or 'Project Name'."),
      upStatus&&upStatus.count&&e("div",{style:{color:"#155724",fontSize:13,padding:"8px 12px",background:"#d4edda",borderRadius:6}},
        "✅ Imported ",e("strong",null,upStatus.count)," tasks for ",e("strong",null,upStatus.name),". Duplicates were skipped."),
      e("div",{className:"upload-hint"},
        e("strong",null,"Excel:")," File → Save As → CSV (Comma delimited). Columns: Project Name, Status, Due Date, Category, Deliverable, Next Action.",e("br"),
        e("strong",null,"Word:")," File → Save As → Plain Text (.txt). Use headings for categories, lines starting with ☐ or ✅ for tasks.")
    ),
    // client list
    e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
      e("div",{style:{fontSize:17,fontWeight:800,color:"#1a1a2e"}},`All Clients (${clients.length})`),
      e("button",{className:"btn",onClick:()=>{setNc({name:"",email:"",org:"",phone:"",website:""});setEditId(null);setNcErr("");setShowModal(true);}},"+ Add New Client")
    ),
    ...clients.map(c=>{
      const tot=tasks.filter(t=>t.client===c.name).length;
      const done=tasks.filter(t=>t.client===c.name&&t.status==="Complete").length;
      const pct=tot>0?Math.round(done/tot*100):0;
      return e("div",{key:c.id,className:"client-card"},
        e("div",{style:{flex:1}},
          e("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
            e("span",{style:{fontSize:16,fontWeight:800,color:"#1a1a2e"}},c.name),
            e("span",{style:{fontSize:11,background:c.status==="Active"?"#d4edda":"#f8d7da",color:c.status==="Active"?"#155724":"#721c24",borderRadius:10,padding:"1px 8px",fontWeight:700}},c.status)
          ),
          e("div",{style:{fontSize:12,color:"#555",lineHeight:1.9}},
            c.org&&e("span",null,"🏢 ",c.org,"  "),
            e("span",null,"📧 ",c.email,"  "),
            c.phone&&e("span",null,"📞 ",c.phone,"  "),
            c.website&&e("span",null,"🌐 ",c.website,"  "),
            e("span",null,"📅 Added ",fmtD(c.addedDate))
          ),
          e("div",{style:{marginTop:8,display:"flex",alignItems:"center",gap:10}},
            e("div",{className:"progress-bar-bg"},e("div",{className:"progress-bar-fill",style:{width:`${pct}%`}})),
            e("span",{style:{fontSize:11,color:"#666"}},`${done}/${tot} tasks (${pct}%)`)
          )
        ),
        e("div",{style:{display:"flex",gap:8,flexShrink:0}},
          e("button",{className:"btn-sm",onClick:()=>startEdit(c)},"Edit"),
          e("button",{className:"btn-ghost",onClick:()=>toggleStatus(c.id)},c.status==="Active"?"Deactivate":"Reactivate")
        )
      );
    }),
    clients.length===0&&e("div",{className:"card",style:{textAlign:"center",color:"#aaa",padding:40}},"No clients yet. Click Add New Client to get started.")
  );

  const ADMIN_COLS=[{k:"projectName",l:"Project Name"},{k:"client",l:"Client"},{k:"category",l:"Category"},{k:"status",l:"Status"},{k:"dueDate",l:"Due Date"},{k:"deliverable",l:"Deliverable"},{k:"nextAction",l:"Next Action"},{k:"lastUpdated",l:"Last Updated"}];
  const CLIENT_COLS=[{k:"projectName",l:"Project Name"},{k:"category",l:"Category"},{k:"status",l:"Status"},{k:"dueDate",l:"Due Date"},{k:"deliverable",l:"Deliverable"},{k:"nextAction",l:"Next Action"},{k:"lastUpdated",l:"Last Updated"}];
  const headerTitle=isAdmin&&!previewAs?"DianaOcasioInc — Admin Dashboard":`${effClient.split(" ")[0]}'s Project Dashboard`;

  return e("div",{style:{fontFamily:"'Segoe UI',Arial,sans-serif",minHeight:"100vh",background:"#f0f2f5"}},
    // header
    e("div",{className:"header"},
      e("span",{className:"header-title"},"DianaOcasioInc · ",headerTitle),
      e("div",{className:"header-right"},
        isAdmin&&!previewAs&&e("button",{className:"btn-outline",onClick:()=>setNotifOpen(o=>!o)},
          "📨 Updates ",unread>0&&e("span",{className:"badge",style:{marginLeft:4}},unread)),
        previewAs&&e("button",{className:"btn-outline",onClick:()=>setPreviewAs(null)},"← Back to Admin"),
        e("button",{className:"btn-outline",onClick:()=>{setUser(null);setLoginEmail("");setPreviewAs(null);}},"Sign Out")
      )
    ),
    // tabs
    isAdmin&&!previewAs&&e("div",{className:"tab-bar"},
      e("button",{className:`tab${tab==="tasks"?" active":""}`,onClick:()=>setTab("tasks")},"📋 Tasks"),
      e("button",{className:`tab${tab==="clients"?" active":""}`,onClick:()=>setTab("clients")},
        "👥 Clients ",clients.length>0&&e("span",{className:"badge-gold"},clients.length))
    ),
    // preview banner
    previewAs&&e("div",{className:"preview-banner"},
      e("span",null,"👁 Previewing as: ",e("strong",null,previewAs)),
      e("button",{style:{background:"white",color:"#fd7e14",border:"none",borderRadius:5,padding:"4px 12px",fontWeight:700,cursor:"pointer"},onClick:()=>setPreviewAs(null)},"Exit Preview")
    ),
    // content
    isClientView
      // CLIENT VIEW
      ? e("div",{className:"body"},
          mkSidebar(false),
          e("div",{className:"main"},
            e("div",{className:"card"},
              e("div",{className:"section-title"},"My Tasks"),
              mkTable(cFiltered,CLIENT_COLS,cCol,cDir,col=>togSort(col,cCol,cDir,setCCol,setCDir))
            ),
            e("div",{className:"card"},
              e("div",{className:"section-title"},"📩 Send Diana an Update"),
              e("label",{className:"lbl"},"What is this about?"),
              e("select",{className:"sel",style:{maxWidth:400},value:notePrj,onChange:ev=>setNotePrj(ev.target.value)},
                e("option",{value:"General"},"General Note"),
                ...cProjects.slice(0,20).map(p=>e("option",{key:p,value:p},p.length>60?p.substring(0,60)+"...":p))
              ),
              e("label",{className:"lbl"},"Your message"),
              e("textarea",{className:"ta",rows:4,style:{marginBottom:12},placeholder:"Type your update, question, or note here...",value:noteText,onChange:ev=>setNoteText(ev.target.value)}),
              e("div",{style:{display:"flex",alignItems:"center",gap:12}},
                e("button",{className:"btn",onClick:sendNote},"Send to Diana"),
                noteSent&&e("span",{className:"ok"},"✓ Message sent!")
              )
            )
          )
        )
      // ADMIN TASKS TAB
      : tab==="tasks"
        ? e("div",null,
            e("div",{className:"body"},
              mkSidebar(true),
              e("div",{className:"main"},
                e("div",{className:"card"},
                  e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
                    e("div",{className:"section-title"},"All Client Tasks"),
                    e("div",{style:{display:"flex",gap:8,flexWrap:"wrap"}},
                      ...activeClients.map(c=>e("button",{key:c.id,className:"btn-sm",onClick:()=>setPreviewAs(c.name)},`Preview as ${c.name.split(" ")[0]}`))
                    )
                  ),
                  mkTable(aFiltered,ADMIN_COLS,aCol,aDir,col=>togSort(col,aCol,aDir,setACol,setADir))
                )
              )
            ),
            e("button",{onClick:()=>setNotifOpen(true),style:{position:"fixed",right:notifOpen?350:0,top:120,background:"#1a1a2e",color:"#d4af37",border:"none",borderRadius:"8px 0 0 8px",padding:"12px 10px",cursor:"pointer",fontSize:12,fontWeight:700,zIndex:199,transition:"right .2s"}},
              "📨",unread>0&&e("span",{className:"badge",style:{display:"block",marginTop:4}},unread))
          )
        // CLIENTS TAB
        : e(ClientsTab,null),
    // panels
    notifOpen&&isAdmin&&e(NotifPanel,null),
    showModal&&e(ClientModal,null)
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
})();
</script>
</body>
</html>
